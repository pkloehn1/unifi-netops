---
# Automated release + changelog via release-please. Conventional Commits on
# `main` drive a maintained release PR that bumps the version (in
# .release-please-manifest.json and, via extra-files, .claude-plugin/plugin.json)
# and regenerates CHANGELOG.md. Merging that PR tags the release and publishes
# a GitHub Release. Config: release-please-config.json + .release-please-manifest.json.
name: release-please

"on":
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Configure SSH commit signing on the runner
        # release-please-action commits via `git commit` on the runner. Without
        # signing config, those commits violate the required_signatures rule on
        # main and the release PR is unmergeable. Import a dedicated SSH signing
        # key (private key in repo secret RELEASE_PLEASE_SIGNING_KEY, public key
        # registered as a Signing Key on the pkloehn1 GitHub account) and pin
        # the committer identity to that account so GitHub verifies the signature.
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_PLEASE_SIGNING_KEY }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${SIGNING_KEY}" > ~/.ssh/id_release_please
          chmod 600 ~/.ssh/id_release_please
          ssh-keygen -y -f ~/.ssh/id_release_please > ~/.ssh/id_release_please.pub
          git config --global gpg.format ssh
          git config --global user.signingkey ~/.ssh/id_release_please.pub
          git config --global commit.gpgsign true
          git config --global tag.gpgsign true
          git config --global user.name 'pkloehn1'
          git config --global user.email '35460307+pkloehn1@users.noreply.github.com'

      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          # PAT (not github.token) so release-please's PRs trigger CI — PRs
          # opened by the built-in token are suppressed by GitHub's workflow
          # loop-prevention, which leaves required checks permanently pending.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
...
